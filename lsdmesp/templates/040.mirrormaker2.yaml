apiVersion: kafka.strimzi.io/v1alpha1
kind: KafkaMirrorMaker2
metadata:
  name: lsdmesp
spec:
  version: 2.7.0
  replicas: 1
  connectCluster: "lsdmesp"
  clusters:
  - alias: "newclicks-kafka"
    bootstrapServers: cluster-01.rancher-01p.newclicks.com:32100
    tls:
      trustedCertificates:
        - secretName: newclicks-kafka-cluster-ca-cert
          certificate: ca.crt
  - alias: "lsdmesp"
    bootstrapServers: lsdmesp-kafka-bootstrap:9093
    tls:
      trustedCertificates:
        - secretName: lsdmesp-cluster-ca-cert
          certificate: ca.crt
    config:
      config.storage.replication.factor: 1
      offset.storage.replication.factor: 1
      status.storage.replication.factor: 1
  mirrors:
  - sourceCluster: "newclicks-kafka"
    targetCluster: "lsdmesp"
    sourceConnector:
      config:
        replication.factor: 1
        offset-syncs.topic.replication.factor: 1
        sync.topic.acls.enabled: "false"
    heartbeatConnector:
      config:
        heartbeats.topic.replication.factor: 1
    checkpointConnector:
      config:
        checkpoints.topic.replication.factor: 1
    topicsPattern: ".*"
    groupsPattern: ".*"
